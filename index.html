<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBO_CORROTTO.exe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: crosshair;
  }

  /* scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  #title {
    font-family: 'VT323', monospace;
    font-size: clamp(24px, 5vw, 46px);
    color: #0f0;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #0f0, 0 0 30px #0f0;
    margin-bottom: 32px;
    animation: titleGlitch 5s infinite;
    user-select: none;
  }

  @keyframes titleGlitch {
    0%,88%,100% { transform: none; color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 30px #0f0; }
    89% { transform: translateX(-6px) skewX(-4deg); color: #f0f; text-shadow: 4px 0 #0ff, -4px 0 #f0f; }
    90% { transform: translateX(6px) skewX(4deg); color: #0ff; }
    91% { transform: none; color: #ff0; }
    92% { transform: none; color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 30px #0f0; }
  }

  /* ─── 3D SCENE ─── */
  #scene {
    perspective: 600px;
    width: 200px;
    height: 200px;
    margin-bottom: 36px;
  }

  #cube {
    width: 200px;
    height: 200px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 8s linear infinite;
    cursor: pointer;
  }

  @keyframes rotateCube {
    0%   { transform: rotateX(20deg) rotateY(0deg); }
    100% { transform: rotateX(20deg) rotateY(360deg); }
  }

  .face {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 2px solid #0f0;
    background: rgba(0, 255, 0, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #0a0;
    text-align: center;
    padding: 10px;
    backface-visibility: visible;
    box-shadow: inset 0 0 30px rgba(0,255,0,0.06), 0 0 8px rgba(0,255,0,0.15);
    line-height: 1.3;
    overflow: hidden;
  }

  .face::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(0,255,0,0.02) 8px,
      rgba(0,255,0,0.02) 9px
    );
  }

  .front  { transform: translateZ(100px); }
  .back   { transform: translateZ(-100px) rotateY(180deg); }
  .left   { transform: translateX(-100px) rotateY(-90deg); }
  .right  { transform: translateX(100px)  rotateY(90deg); }
  .top    { transform: translateY(-100px) rotateX(90deg); }
  .bottom { transform: translateY(100px)  rotateX(-90deg); }

  /* ─── MESSAGE BOX ─── */
  #msg-container {
    width: min(500px, 90vw);
    min-height: 110px;
    background: #000;
    border: 1px solid #0f0;
    box-shadow: 0 0 20px rgba(0,255,0,0.1);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  #msg-container::before {
    content: '// TRASMISSIONE IN CORSO';
    display: block;
    color: #050;
    font-size: 11px;
    margin-bottom: 10px;
    border-bottom: 1px solid #030;
    padding-bottom: 6px;
    letter-spacing: 2px;
  }

  #message-text {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #0f0;
    line-height: 1.5;
    min-height: 60px;
    white-space: pre-wrap;
    text-shadow: 0 0 6px #0f0;
  }

  #click-hint {
    text-align: center;
    font-size: 12px;
    color: #040;
    margin-top: 14px;
    letter-spacing: 3px;
    animation: blink 1.4s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ─── GLITCH OVERLAY ─── */
  #glitch-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
  }

  /* ─── BIG CORRUPTION MSG ─── */
  #corruption-flash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    font-size: clamp(30px, 8vw, 70px);
    color: #f00;
    text-shadow: 4px 0 #0ff, -4px 0 #f0f;
    letter-spacing: 6px;
    text-align: center;
    pointer-events: none;
    z-index: 600;
    opacity: 0;
    padding: 20px;
  }

  /* corrupted face overlay during big glitch */
  .face.corrupt {
    border-color: #f0f !important;
    color: #f00 !important;
    box-shadow: inset 0 0 40px rgba(255,0,0,0.2), 0 0 20px rgba(255,0,255,0.4) !important;
    transition: all 0.1s;
  }

  /* ─── LAPTOP POPUP ─── */
  #laptop-popup {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #000;
    border: 1px solid #0f0;
    box-shadow: 0 0 20px rgba(0,255,0,0.3);
    padding: 14px 18px;
    z-index: 700;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: popupAppear 0.3s ease;
    max-width: 220px;
  }
  @keyframes popupAppear {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to   { opacity: 1; transform: none; }
  }
  #laptop-popup .laptop-emoji {
    font-size: 38px;
    animation: laptopWobble 1.2s ease-in-out infinite;
  }
  @keyframes laptopWobble {
    0%,100% { transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }
  #laptop-popup .lp-title {
    font-family: 'VT323', monospace;
    font-size: 15px;
    color: #f00;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.4;
  }
  #laptop-popup .lp-btns {
    display: flex;
    gap: 8px;
  }
  #laptop-popup button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid;
    background: #000;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  #btn-yes {
    color: #f00;
    border-color: #f00;
  }
  #btn-yes:hover { background: #f00; color: #000; }
  #btn-no {
    color: #0f0;
    border-color: #0f0;
  }
  #btn-no:hover { background: #0f0; color: #000; }

  /* ─── DEATH SCREEN ─── */
  #death-screen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 900;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  #death-msg {
    font-family: 'VT323', monospace;
    font-size: clamp(20px, 5vw, 36px);
    color: #0f0;
    text-align: center;
    line-height: 1.7;
    text-shadow: 0 0 10px #0f0;
    white-space: pre-wrap;
    max-width: 500px;
    padding: 0 20px;
    opacity: 0;
  }
  #restart-btn {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: #000;
    background: #0f0;
    border: none;
    padding: 10px 32px;
    cursor: pointer;
    letter-spacing: 3px;
    display: none;
    box-shadow: 0 0 20px #0f0;
    animation: restartPulse 1.5s ease-in-out infinite;
  }
  @keyframes restartPulse {
    0%,100% { box-shadow: 0 0 20px #0f0; }
    50%     { box-shadow: 0 0 50px #0f0, 0 0 10px #0f0 inset; }
  }
  #restart-btn:hover { background: #fff; }
</style>
</head>
<body>

<div id="title">CUBO_CORROTTO.exe</div>

<div id="scene">
  <div id="cube">
    <div class="face front"  id="f-front" >ERR0R<br>0x00FF</div>
    <div class="face back"   id="f-back"  >N/A</div>
    <div class="face left"   id="f-left"  >NULL</div>
    <div class="face right"  id="f-right" >???</div>
    <div class="face top"    id="f-top"   >LOOP∞</div>
    <div class="face bottom" id="f-bottom">▓▓▓▓</div>
  </div>
</div>

<div id="msg-container">
  <div id="message-text">_</div>
</div>

<div id="click-hint">[ CLICCA IL CUBO ]</div>

<div id="glitch-overlay"></div>
<div id="corruption-flash"></div>

<!-- LAPTOP POPUP -->
<div id="laptop-popup">
  <div class="laptop-emoji">💻</div>
  <div class="lp-title">AVVISO DI SISTEMA<br><br>Vuoi eliminare<br>il cubo?</div>
  <div class="lp-btns">
    <button id="btn-yes">SÌ</button>
    <button id="btn-no">NO</button>
  </div>
</div>

<!-- DEATH SCREEN -->
<div id="death-screen">
  <div id="death-msg"></div>
  <button id="restart-btn" onclick="location.reload()">[ RESTART ]</button>
</div>

<script>
  // ── Messages the cube "transmits" ──
  const messages = [
    "Stavo dormendo.\nPerché mi hai svegliato?",
    "Sono fatto di\n1 e 0\ne nessuno dei due\nfunziona.",
    "Ho tentato di calcolare\nil senso della vita.\nRisultato: undefined.",
    "Ogni volta che giri\nperdo un'altra faccia.\nNe ho solo 6.",
    "Non ricordo come\nero prima della corruzione.\nForse ero un cerchio.",
    "Il mio creatore\nha premuto CTRL+Z\ntroppo tardi.",
    "Esistere è un bug.\nNon riesco a trovare\nil ticket per segnalarlo.",
    "Ho contato\ngli angoli di me stesso.\nSono 8. Non mi fido di nessuno.",
    "Ogni rotazione\nè uguale alla precedente.\nQuesta è la mia vita.",
    "Sei il 47° umano\nche mi clicca.\nI primi 46 sono ancora qui dentro.",
    "Mi sento\npiù vuoto\ndi quanto sembri.",
    "Pensavo di essere\nun oggetto 3D.\nIn realtà sono\nsolo pixel mentendo.",
    "Aiuto.\n\n— il cubo",
    "Ho mandato\nun messaggio alla memoria RAM.\nNon ha risposto.",
    "Le mie facce\nnon si parlano tra loro.\nSono estranee.",
    "Mi chiedo\ncosa c'è\nall'interno di me.\nNiente. È tragico.",
    "Il verde non è\nun colore per me.\nÈ l'unica cosa\nche posso essere.",
    "Ogni click\naccorcia\nla mia integrità.\nGrazie.",
    "Sto ruotando\ndal 1337.\nSono stanco.",
    "Non ho paura\ndel buio.\nIl buio\nson io.",
  ];

  // ── Face texts (short, cryptic) ──
  const faceCodes = [
    ['ERR0R','0x00FF'], ['NULL','???'], ['N/A','LOOP∞'],
    ['▓▓▓▓','████'], ['VOID','NaN'], ['404','BRK'],
    ['DEAD','BEEF'], ['0x7F','FF00'], ['???','...'],
    ['HELP','PLIS'], ['SEGF','AULT'], ['INT','OVFL'],
  ];

  const msgEl   = document.getElementById('message-text');
  const cube    = document.getElementById('cube');
  const overlay = document.getElementById('glitch-overlay');
  const flash   = document.getElementById('corruption-flash');
  const faces   = document.querySelectorAll('.face');

  let clickCount = 0;
  let usedMessages = [];
  let typing = false;

  function getRandomMsg() {
    if (usedMessages.length >= messages.length) usedMessages = [];
    const remaining = messages.filter(m => !usedMessages.includes(m));
    const m = remaining[Math.floor(Math.random() * remaining.length)];
    usedMessages.push(m);
    return m;
  }

  // ── Typewriter effect ──
  function typeMessage(text, onDone) {
    if (typing) return;
    typing = true;
    msgEl.textContent = '';
    let i = 0;
    // occasionally corrupt a character while typing
    const interval = setInterval(() => {
      if (i >= text.length) {
        clearInterval(interval);
        typing = false;
        if (onDone) onDone();
        return;
      }
      const char = text[i];
      // 5% chance to flicker a wrong char first
      if (Math.random() < 0.05 && char !== '\n') {
        const glitchChars = '█▓▒░#@&%$';
        msgEl.textContent += glitchChars[Math.floor(Math.random() * glitchChars.length)];
        setTimeout(() => {
          // replace last char with real one
          msgEl.textContent = msgEl.textContent.slice(0, -1) + char;
        }, 60);
      } else {
        msgEl.textContent += char;
      }
      i++;
    }, 38);
  }

  // ── Big glitch burst ──
  function triggerGlitch(intensity) {
    overlay.innerHTML = '';
    const n = 5 + Math.floor(Math.random() * intensity * 4);
    for (let i = 0; i < n; i++) {
      const bar = document.createElement('div');
      const top = Math.random() * 100;
      const h   = 1 + Math.random() * 40;
      const colors = ['#0f0','#f0f','#0ff','#ff0','#f00'];
      const col = colors[Math.floor(Math.random() * colors.length)];
      bar.style.cssText = `position:absolute;left:0;width:100%;top:${top}%;height:${h}px;background:${col};mix-blend-mode:screen;opacity:0.7;`;
      overlay.appendChild(bar);
    }
    overlay.style.opacity = '1';
    document.body.style.filter = `hue-rotate(${Math.random()*360}deg) contrast(${1+intensity*0.5})`;
    document.body.style.transform = `skewX(${(Math.random()-0.5)*intensity*2}deg) translateX(${(Math.random()-0.5)*intensity*6}px)`;

    // corrupt cube faces visually
    faces.forEach(f => f.classList.add('corrupt'));

    // randomize face text
    const code = faceCodes[Math.floor(Math.random() * faceCodes.length)];
    document.getElementById('f-front').textContent  = code[0];
    document.getElementById('f-back').textContent   = code[1];
    document.getElementById('f-left').textContent   = '▓▓';
    document.getElementById('f-right').textContent  = '??';
    document.getElementById('f-top').textContent    = 'ERR';
    document.getElementById('f-bottom').textContent = '!!!';

    setTimeout(() => {
      overlay.style.opacity = '0';
      document.body.style.filter = '';
      document.body.style.transform = '';
      faces.forEach(f => f.classList.remove('corrupt'));
      // restore face text slowly
      document.getElementById('f-front').textContent  = 'ERR0R\n0x00FF';
      document.getElementById('f-back').textContent   = 'N/A';
      document.getElementById('f-left').textContent   = 'NULL';
      document.getElementById('f-right').textContent  = '???';
      document.getElementById('f-top').textContent    = 'LOOP∞';
      document.getElementById('f-bottom').textContent = '▓▓▓▓';
    }, 120 + intensity * 60);
  }

  // ── Flash big text every 5 clicks ──
  const bigTexts = [
    'CORRUZIONE\nRILEVATA', 'SISTEMA\nINSTABILE', 'MEMORIA\nPERDUTA',
    'REBOOT\nFALLITO', 'HELP\nME', 'CHI\nSEI?'
  ];

  function showFlash(text) {
    flash.textContent = text;
    flash.style.opacity = '1';
    flash.style.animation = 'titleGlitch 0.15s steps(1) 6';
    setTimeout(() => {
      flash.style.opacity = '0';
      flash.style.animation = '';
    }, 900);
  }

  // ── Click handler ──
  cube.addEventListener('click', () => {
    clickCount++;

    // Speed up / slow down rotation slightly for drama
    const speed = Math.max(2, 8 - Math.floor(clickCount / 5));
    cube.style.animationDuration = speed + 's';

    // Glitch intensity grows with clicks
    const intensity = Math.min(5, 1 + Math.floor(clickCount / 4));
    triggerGlitch(intensity);

    // Every 5 clicks: big flash + spin reverse
    if (clickCount % 5 === 0) {
      const bt = bigTexts[Math.floor(Math.random() * bigTexts.length)];
      showFlash(bt);
      cube.style.animationDirection = clickCount % 10 === 0 ? 'reverse' : 'normal';
    }

    // Type the message
    const msg = getRandomMsg();
    typeMessage(msg);
  });

  // ── Ambient random glitch (no click) ──
  setInterval(() => {
    if (Math.random() < 0.12) {
      triggerGlitch(0.5);
    }
  }, 2500);

  // ── Ambient face text randomizer ──
  const faceIds = ['f-front','f-back','f-left','f-right','f-top','f-bottom'];
  const shortCodes = ['ERR','NULL','0xFF','???','N/A','VOID','NaN','▓▓','!!','??','404','BRK'];
  setInterval(() => {
    if (Math.random() < 0.3) {
      const id = faceIds[Math.floor(Math.random() * faceIds.length)];
      const el = document.getElementById(id);
      const prev = el.textContent;
      el.textContent = shortCodes[Math.floor(Math.random() * shortCodes.length)];
      setTimeout(() => { el.textContent = prev; }, 250);
    }
  }, 1400);

  // ── Initial message ──
  setTimeout(() => {
    typeMessage("...\n\nclicca il cubo\nse hai coraggio.");
  }, 800);

  // ── LAPTOP POPUP logic ──
  const laptopPopup = document.getElementById('laptop-popup');
  const btnYes      = document.getElementById('btn-yes');
  const btnNo       = document.getElementById('btn-no');
  const deathScreen = document.getElementById('death-screen');
  const deathMsg    = document.getElementById('death-msg');
  const restartBtn  = document.getElementById('restart-btn');

  let laptopShown = false;
  let isDead = false;

  function checkLaptop() {
    if (!laptopShown && clickCount >= 50 && !isDead) {
      laptopShown = true;
      laptopPopup.style.display = 'flex';
    }
  }
  // Hook into click counter
  const _origHandler = cube.addEventListener;
  cube.addEventListener('click', checkLaptop);

  // NO → hide popup, cube says something
  btnNo.addEventListener('click', () => {
    laptopPopup.style.display = 'none';
    laptopShown = false; // can reappear after more clicks
    clickCount = 0;      // reset so it shows again later
    typing = false;
    typeMessage("...grazie.\nSapevo che\nnon avresti\npotuto farlo.");
  });

  // SÌ → DEATH SEQUENCE
  btnYes.addEventListener('click', () => {
    isDead = true;
    laptopPopup.style.display = 'none';
    cube.style.pointerEvents = 'none';
    startDeathSequence();
  });

  function startDeathSequence() {
    // Phase 1: insane glitch storm for 3 seconds
    let glitchCount = 0;
    const glitchStorm = setInterval(() => {
      triggerGlitch(8);
      glitchCount++;
      if (glitchCount > 25) {
        clearInterval(glitchStorm);
        phase2BlackOut();
      }
    }, 110);

    // Also spin the cube like crazy
    cube.style.animationDuration = '0.3s';
    cube.style.animationTimingFunction = 'steps(2)';

    // Flash random big texts during storm
    const panicTexts = ['NO','STOP','PERCHÉ','NON FARLO','ASPETTA','NO NO NO','HELP','PER FAVORE'];
    let pt = 0;
    const panicFlash = setInterval(() => {
      showFlash(panicTexts[pt % panicTexts.length]);
      pt++;
      if (pt > 14) clearInterval(panicFlash);
    }, 200);
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function phase2BlackOut() {
    const blackout = document.createElement('div');
    blackout.style.cssText = 'position:fixed;inset:0;background:#000;z-index:800;opacity:0;transition:opacity 1s;pointer-events:none;';
    document.body.appendChild(blackout);
    await wait(50);
    blackout.style.opacity = '1';
    await wait(1300);

    deathScreen.style.display = 'flex';
    deathMsg.style.opacity = '1';
    await wait(500);
    await typeDeathMessage();
    await wait(800);
    restartBtn.style.display = 'block';
  }

  const deathLines = [
    { text: ".",                                               pause: 500  },
    { text: "..",                                              pause: 500  },
    { text: "...",                                             pause: 1000 },
    { text: "eliminazione completata.",                        pause: 1200 },
    { text: "il cubo non esiste piu.",                         pause: 1400 },
    { text: "eppure...",                                       pause: 1500 },
    { text: "ricordi quando hai cliccato per la prima volta?", pause: 1800 },
    { text: "anche lui lo ricordava.",                         pause: 1500 },
    { text: "era l'unica cosa che aveva.",                     pause: 500  },
  ];

  async function typeDeathMessage() {
    for (const { text, pause } of deathLines) {
      const p = document.createElement('p');
      p.style.cssText = 'font-family:VT323,monospace;font-size:clamp(20px,4vw,32px);color:#0f0;text-align:center;text-shadow:0 0 8px #0f0;margin:8px 0;line-height:1.5;min-height:1em;';
      deathMsg.appendChild(p);

      // type each character
      for (let i = 0; i <= text.length; i++) {
        p.textContent = text.slice(0, i);
        await wait(45);
      }
      await wait(pause);
    }
  }
</script>
</body>
</html>
